name: Build and Release
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}
permissions:
  contents: write
  packages: write
jobs:
  build-macos:
    runs-on: macos-15
    strategy:
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            platform: mac-x64
          - arch: arm64
            platform: mac-arm64
    env:
      CSC_LINK: ${{ secrets.DESKOPILOT_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.DESKOPILOT_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.DESKOPILOT_APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.DESKOPILOT_APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.DESKOPILOT_APPLE_TEAM_ID }}
      NOTARIZE: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build electron app (per-arch)
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            npx electron-builder --mac --arm64 --publish never
          else
            npx electron-builder --mac --x64 --publish never
          fi

      - name: Rename latest-mac.yml to arch-specific name
        run: |
          if [ -f build/latest-mac.yml ]; then
            mv build/latest-mac.yml build/latest-mac-${{ matrix.arch }}.yml
          fi

      - name: List build contents
        run: ls -la build || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts-${{ matrix.arch }}
          path: |
            build/*.dmg
            build/*.zip
            build/latest-mac-${{ matrix.arch }}.yml
            build/*.blockmap
            build/*.sha512
          retention-days: 1

  create-release:
    needs: [build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (for merge script)
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Setup Node.js (for merging manifests)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Merge macOS update manifests into single latest-mac.yml
        run: |
          set -e
          mkdir -p combined
          node scripts/merge-latest-mac.cjs \
            --x64 macos-artifacts-x64/latest-mac-x64.yml \
            --arm64 macos-artifacts-arm64/latest-mac-arm64.yml \
            --out combined/latest-mac.yml

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            macos-artifacts-*/**/*
            combined/latest-mac.yml
          draft: true
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

appId: com.deskopilot.app
productName: deskopilot
copyright: Copyright © 2026 Louis Liu

directories:
  output: dist
  buildResources: resources

# What ships inside the .app bundle.
# - out/**          : built main + preload + renderer
# - resources/**    : tray icon (and future image assets)
# - pets/default/** : the built-in fallback pet
files:
  - out/**/*
  - resources/**/*
  - package.json
extraResources:
  - from: pets/default
    to: pets/default
    filter:
      - "**/*"

mac:
  category: public.app-category.productivity
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null # unsigned for v1; notarization deferred
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  extendInfo:
    LSUIElement: true # menu-bar-only app; hide from Dock
    NSAppleEventsUsageDescription: "deskopilot reads which app is in focus."

dmg:
  artifactName: ${productName}-${version}-${arch}.dmg
